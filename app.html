<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spanish Flashcard Quiz</title>
<style>
    :root { --navy:#0d2240; --gold:#f3c75a; --accent:#c64e2e; --green:#2e8b57; }
    * { box-sizing: border-box; }
    body {
        margin: 0; min-height: 100vh;
        font-family: 'Segoe UI', Verdana, sans-serif;
        background: linear-gradient(135deg, #0d2240 0%, #1c3a63 60%, #c64e2e 140%);
        color: #fff; display: flex; flex-direction: column; align-items: center;
        padding: 24px;
    }
    a.back { color: var(--gold); align-self: flex-start; text-decoration: none; font-weight: bold; }
    a.back:hover { text-decoration: underline; }
    h1 { margin: 8px 0 2px; }
    .sub { color: #cdd7e4; margin-top: 0; }

    .card {
        background: #fff; color: #25303b; border-radius: 16px;
        box-shadow: 0 12px 40px rgba(0,0,0,.35);
        width: 100%; max-width: 520px; padding: 26px; margin-top: 14px;
    }

    .toprow { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
    .stat { background:#f1f4f8; border-radius:10px; padding:8px 12px; text-align:center; flex:1; }
    .stat b { display:block; font-size:1.4rem; color:var(--navy); }
    .stat span { font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; color:#6b7785; }

    select { padding:8px 10px; border-radius:8px; border:1px solid #cbd3dc; font-size:1rem; }

    .prompt { text-align:center; margin:22px 0 6px; }
    .prompt .word { font-size:2.4rem; font-weight:700; color:var(--navy); }
    .prompt .hint { color:#6b7785; font-size:.9rem; }

    .options { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:18px; }
    .opt {
        padding:14px; border:2px solid #d7dee6; border-radius:12px; background:#fff;
        font-size:1.05rem; cursor:pointer; transition:.15s; color:#25303b;
    }
    .opt:hover:not(:disabled) { border-color:var(--navy); transform:translateY(-2px); }
    .opt:disabled { cursor:default; }
    .opt.correct { background:var(--green); border-color:var(--green); color:#fff; }
    .opt.wrong { background:var(--accent); border-color:var(--accent); color:#fff; }

    .feedback { text-align:center; min-height:24px; margin-top:14px; font-weight:600; }
    .bar { height:8px; background:#e6ebf1; border-radius:99px; overflow:hidden; margin-top:16px; }
    .bar > div { height:100%; width:0; background:var(--gold); transition:width .3s; }

    button.next {
        margin-top:16px; width:100%; padding:13px; border:0; border-radius:12px;
        background:var(--navy); color:#fff; font-size:1rem; font-weight:600; cursor:pointer;
    }
    button.next:hover { background:#16315a; }

    .done { text-align:center; }
    .done .big { font-size:3rem; }
</style>
</head>
<body>

    <!-- Link BACK to the scratch page (required) -->
    <a class="back" href="scratch.html">&larr; Back to my Spanish page</a>

    <h1>🇪🇸 Spanish Flashcard Quiz</h1>
    <p class="sub">Pick a category and translate the word. Build your streak!</p>

    <div class="card" id="game">
        <div class="toprow">
            <div class="stat"><b id="score">0</b><span>Score</span></div>
            <div class="stat"><b id="streak">0</b><span>Streak</span></div>
            <div class="stat"><b id="best">0</b><span>Best Streak</span></div>
        </div>

        <label for="cat"><strong>Category:</strong></label>
        <select id="cat" onchange="startQuiz()">
            <option value="all">All</option>
            <option value="Colors">Colors</option>
            <option value="Animals">Animals</option>
            <option value="Food">Food</option>
            <option value="Numbers">Numbers</option>
            <option value="Travel">Travel</option>
        </select>

        <div id="quizArea">
            <div class="prompt">
                <div class="word" id="word">—</div>
                <div class="hint" id="hint"></div>
            </div>
            <div class="options" id="options"></div>
            <div class="feedback" id="feedback"></div>
            <div class="bar"><div id="progress"></div></div>
            <button class="next" id="nextBtn" onclick="nextQuestion()" style="display:none;">Next →</button>
        </div>
    </div>

<script>
/* ---- Vocabulary data (Spanish -> English) ---- */
const VOCAB = [
    {es:"rojo", en:"red", cat:"Colors"}, {es:"azul", en:"blue", cat:"Colors"},
    {es:"verde", en:"green", cat:"Colors"}, {es:"amarillo", en:"yellow", cat:"Colors"},
    {es:"negro", en:"black", cat:"Colors"}, {es:"blanco", en:"white", cat:"Colors"},
    {es:"perro", en:"dog", cat:"Animals"}, {es:"gato", en:"cat", cat:"Animals"},
    {es:"caballo", en:"horse", cat:"Animals"}, {es:"pájaro", en:"bird", cat:"Animals"},
    {es:"pez", en:"fish", cat:"Animals"}, {es:"oso", en:"bear", cat:"Animals"},
    {es:"manzana", en:"apple", cat:"Food"}, {es:"pan", en:"bread", cat:"Food"},
    {es:"queso", en:"cheese", cat:"Food"}, {es:"pollo", en:"chicken", cat:"Food"},
    {es:"arroz", en:"rice", cat:"Food"}, {es:"leche", en:"milk", cat:"Food"},
    {es:"uno", en:"one", cat:"Numbers"}, {es:"dos", en:"two", cat:"Numbers"},
    {es:"tres", en:"three", cat:"Numbers"}, {es:"cuatro", en:"four", cat:"Numbers"},
    {es:"cinco", en:"five", cat:"Numbers"}, {es:"diez", en:"ten", cat:"Numbers"},
    {es:"aeropuerto", en:"airport", cat:"Travel"}, {es:"playa", en:"beach", cat:"Travel"},
    {es:"hotel", en:"hotel", cat:"Travel"}, {es:"mapa", en:"map", cat:"Travel"},
    {es:"tren", en:"train", cat:"Travel"}, {es:"maleta", en:"suitcase", cat:"Travel"}
];

const TOTAL = 10;  // questions per round
let pool=[], idx=0, score=0, streak=0, best=0, current=null;

function shuffle(a){ return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(v=>v[1]); }

function startQuiz(){
    const cat = document.getElementById('cat').value;
    let words = cat==='all' ? VOCAB : VOCAB.filter(w=>w.cat===cat);
    pool = shuffle(words).slice(0, Math.min(TOTAL, words.length));
    idx=0; score=0; streak=0;
    document.getElementById('score').textContent=0;
    document.getElementById('streak').textContent=0;
    document.getElementById('quizArea').style.display='block';
    showQuestion();
}

function showQuestion(){
    current = pool[idx];
    document.getElementById('word').textContent = current.es;
    document.getElementById('hint').textContent = "Category: " + current.cat;
    document.getElementById('feedback').textContent = "";
    document.getElementById('nextBtn').style.display='none';
    document.getElementById('progress').style.width = (idx/pool.length*100)+"%";

    // Build 4 options: the correct answer + 3 distractors
    let distractors = shuffle(VOCAB.filter(w=>w.en!==current.en)).slice(0,3).map(w=>w.en);
    let opts = shuffle([current.en, ...distractors]);

    const box = document.getElementById('options');
    box.innerHTML='';
    opts.forEach(o=>{
        const b=document.createElement('button');
        b.className='opt'; b.textContent=o;
        b.onclick=()=>checkAnswer(b,o);
        box.appendChild(b);
    });
}

function checkAnswer(btn, choice){
    const buttons = document.querySelectorAll('.opt');
    buttons.forEach(b=>{
        b.disabled=true;
        if(b.textContent===current.en) b.classList.add('correct');
    });
    const fb=document.getElementById('feedback');
    if(choice===current.en){
        score++; streak++; best=Math.max(best,streak);
        fb.textContent = "¡Correcto! 🎉";
        fb.style.color = "#2e8b57";
    } else {
        streak=0;
        btn.classList.add('wrong');
        fb.textContent = '"'+current.es+'" means "'+current.en+'"';
        fb.style.color = "#c64e2e";
    }
    document.getElementById('score').textContent=score;
    document.getElementById('streak').textContent=streak;
    document.getElementById('best').textContent=best;
    document.getElementById('nextBtn').style.display='block';
}

function nextQuestion(){
    idx++;
    if(idx>=pool.length){ finish(); return; }
    showQuestion();
}

function finish(){
    document.getElementById('progress').style.width="100%";
    const pct = Math.round(score/pool.length*100);
    let msg = pct>=80 ? "¡Excelente! 🌟" : pct>=50 ? "¡Bien hecho! 👍" : "¡Sigue practicando! 💪";
    document.getElementById('quizArea').innerHTML =
        '<div class="done"><div class="big">'+pct+'%</div>'+
        '<p>'+msg+'</p><p>You got <b>'+score+'</b> of <b>'+pool.length+'</b> correct. '+
        'Best streak: <b>'+best+'</b>.</p>'+
        '<button class="next" onclick="startQuiz()">Play Again ↻</button></div>';
}

startQuiz();  // start on load
</script>
</body>
</html>
